<!-- Contact Hero -->
<section class="page-hero">
  <div class="container">
    <h1>Contact Us</h1>
    <p class="page-subtitle">We'd love to hear from you. Reach out and we'll respond within 24 hours.</p>
  </div>
</section>

<!-- Contact Section -->
<section class="contact-section">
  <div class="container">
    <form class="contact-form">
      <div class="form-row">
        <div class="form-group">
          <label for="first-name">First Name</label>
          <input type="text" id="first-name" name="first_name" required>
        </div>
        <div class="form-group">
          <label for="last-name">Last Name</label>
          <input type="text" id="last-name" name="last_name" required>
        </div>
      </div>
      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" required>
      </div>
      <div class="form-group">
        <label for="phone">Phone</label>
        <input type="tel" id="phone" name="phone">
      </div>
      <div class="form-group">
        <label for="message">Message</label>
        <textarea id="message" name="message" rows="5" required></textarea>
      </div>
      <button type="submit" class="btn btn-primary btn-block">Send Message</button>
    </form>
  </div>
</section>

<!-- Calendly -->
<section class="calendly-section">
  <div class="container">
    <h2 class="section-title">Schedule a Meeting</h2>
    <p class="section-subtitle">Book a free 30-minute call to see how Genius Sheets can work for you.</p>
    <link href="https://assets.calendly.com/assets/external/widget.css" rel="stylesheet">
    <script src="https://assets.calendly.com/assets/external/widget.js" type="text/javascript" async></script>
    <div class="calendly-inline-widget" data-url="https://calendly.com/joe-geniussheets/30min" style="min-width:320px;height:700px;"></div>
  </div>
</section>
